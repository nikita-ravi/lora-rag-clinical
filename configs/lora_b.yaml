# LoRA-B configuration: Q + passages → reasoned A (RAFT-style)
# This is the experimental condition - trained to reason over passages

# Inherit base config
_base_: "base.yaml"

# Recipe identifier
recipe: "lora_b"
description: "RAFT-style fine-tuning (Q + passages → reasoned A with citations)"

# LoRA configuration (same as other recipes)
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

# Training configuration (same as other recipes)
training:
  num_epochs: 1
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  optim: "adamw_8bit"
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  save_steps: 200
  save_total_limit: 3
  logging_steps: 10
  report_to: "wandb"

# Input format - same as LoRA-A'
input:
  include_passages: true
  num_passages: 5
  gold_passage_prob: 0.8  # Same distractor sampling as LoRA-A'

  # Target: "Based on... [reasoning with citations]... Answer: [label]"
  # Uses synthetic targets generated by Claude Haiku
  use_synthetic_targets: true

# Synthetic data generation settings
synthetic:
  model: "claude-3-5-haiku-20241022"
  seed: 42
  cache_dir: "data/synthetic/cache"

  # Filtering criteria
  filter:
    require_label_match: true
    require_valid_citations: true
    min_output_tokens: 50

# Seeds (same as other recipes)
seeds:
  - 42
  - 123
  - 456
