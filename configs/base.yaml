# Base configuration - shared across all experiments

# Reproducibility
seed: 42
deterministic: true

# Model
model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  quantization: "4bit"  # QLoRA
  dtype: "bfloat16"
  max_seq_len: 2048

# Data
data:
  train_source: "bioasq"  # Primary training data
  eval_source: "pubmedqa"  # Primary evaluation data
  validation_source: "mirage"  # External validation (held-out)
  question_types:
    - "factoid"
    - "yesno"
  # List questions excluded - different answer format

# Logging
logging:
  wandb_project: "lora-rag-clinical"
  log_every_n_steps: 10
  save_every_n_steps: 200

# Paths (override via environment or CLI)
paths:
  output_dir: "./results"
  cache_dir: "./cache"
  index_dir: "./index"
